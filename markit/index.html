<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self'" />
    <title>Markdown Editor</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="container">
      <div id="explorer">
        <ul id="tree"></ul>
      </div>
      <div id="main">
        <div id="search" style="display: none">
          <input
            id="search-input"
            type="text"
            placeholder="Input the keyworks you want to search"
          />
          <div id="search-result"></div>
        </div>
        <textarea id="editor" placeholder="Please input here"></textarea>
        <div id="previewer" style="display: none"></div>
      </div>
    </div>
    <script src="./renderer/renderer.js"></script>
    <script src="./renderer/menu.js"></script>
  </body>
</html>
