<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>Markdown Editor</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="container">
      <div id="explorer">
        <div id="global-search" style="display: none">
          <input
            id="global-search-input"
            type="text"
            placeholder="Input the keyworks you want to search"
          />
        </div>
        <ul id="tree"></ul>
      </div>
      <div id="main">
        <div id="mode-indicator" title="Current mode">
          <span id="mode-icon">✏️</span>
        </div>
        <div id="local-search" style="display: none">
          <input
            id="local-search-input"
            type="text"
            placeholder="Input the keyworks you want to search"
          />
          <div id="local-search-result"></div>
        </div>
        <textarea id="editor" placeholder="Please input here"></textarea>
        <div id="previewer" style="display: none"></div>
        <div id="global-search-result" style="display: none"></div>
      </div>
    </div>

    <!-- Recent Files Switcher Modal -->
    <div id="recent-files-modal" class="recent-files-modal" style="display: none;">
      <div class="recent-files-modal-content">
        <div class="recent-files-modal-header">
          <span class="recent-files-modal-title">Recent Files</span>
          <span class="recent-files-modal-hint">Ctrl/Cmd + Tab to navigate (folder root required)</span>
        </div>
        <ul id="recent-files-list" class="recent-files-list"></ul>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="settings-modal" style="display: none;">
      <div class="settings-modal-content">
        <div class="settings-modal-header">
          <span class="settings-modal-title">Settings</span>
          <button id="settings-close-btn" class="settings-close-btn" aria-label="Close settings">&times;</button>
        </div>
        <div class="settings-modal-body">
          <!-- Theme Settings -->
          <div class="settings-section">
            <h3 class="settings-section-title">Appearance</h3>
            <div class="settings-row">
              <label for="setting-theme">Theme</label>
              <select id="setting-theme" class="settings-select">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="auto">Auto (System)</option>
              </select>
            </div>
          </div>

          <!-- Font Settings -->
          <div class="settings-section">
            <h3 class="settings-section-title">Editor</h3>
            <div class="settings-row">
              <label for="setting-font-family">Font Family</label>
              <select id="setting-font-family" class="settings-select">
                <option value="monospace">Monospace</option>
                <option value="system-ui">System UI</option>
                <option value="Georgia">Georgia</option>
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times New Roman</option>
              </select>
            </div>
            <div class="settings-row">
              <label for="setting-font-size">Font Size: <span id="setting-font-size-value">14</span>px</label>
              <input type="range" id="setting-font-size" class="settings-range" min="10" max="24" value="14" />
            </div>
          </div>

          <!-- Autosave Settings -->
          <div class="settings-section">
            <h3 class="settings-section-title">Autosave</h3>
            <div class="settings-row">
              <label for="setting-autosave-enabled">Enable Autosave</label>
              <input type="checkbox" id="setting-autosave-enabled" class="settings-checkbox" />
            </div>
            <div class="settings-row">
              <label for="setting-autosave-interval">Autosave Interval: <span id="setting-autosave-interval-value">30</span>s</label>
              <input type="range" id="setting-autosave-interval" class="settings-range" min="5" max="300" step="5" value="30" />
            </div>
          </div>
        </div>
        <div class="settings-modal-footer">
          <button id="settings-reset-btn" class="settings-btn settings-btn-secondary">Reset to Defaults</button>
          <button id="settings-save-btn" class="settings-btn settings-btn-primary">Save Changes</button>
        </div>
      </div>
    </div>

    <script src="./renderer/renderer.js"></script>
  </body>
</html>
