<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>Markdown Editor</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="container">
      <div id="explorer">
        <div id="global-search" style="display: none">
          <input
            id="global-search-input"
            type="text"
            placeholder="Input the keyworks you want to search"
          />
        </div>
        <ul id="tree"></ul>
      </div>
      <div id="main">
        <div id="mode-indicator" title="Current mode">
          <span id="mode-icon">✏️</span>
        </div>
        <div id="local-search" style="display: none">
          <input
            id="local-search-input"
            type="text"
            placeholder="Input the keyworks you want to search"
          />
          <div id="local-search-result"></div>
        </div>
        <textarea id="editor" placeholder="Please input here"></textarea>
        <div id="previewer" style="display: none"></div>
        <div id="global-search-result" style="display: none"></div>
      </div>
    </div>

    <!-- Recent Files Switcher Modal -->
    <div id="recent-files-modal" class="recent-files-modal" style="display: none;">
      <div class="recent-files-modal-content">
        <div class="recent-files-modal-header">
          <span class="recent-files-modal-title">Recent Files</span>
          <span class="recent-files-modal-hint">Ctrl/Cmd + Tab to navigate (folder root required)</span>
        </div>
        <ul id="recent-files-list" class="recent-files-list"></ul>
      </div>
    </div>

    <script src="./renderer/renderer.js"></script>
  </body>
</html>
