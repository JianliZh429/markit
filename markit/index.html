<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <meta http-equiv="Content-Security-Policy" content="script-src 'self'; unsafe-eval" /> -->
    <title>Markdown Editor</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div id="explorer">
      <ul id="tree"></ul>
    </div>
    <textarea id="editor" placeholder="Please input here"></textarea>
    <div id="previewer" style="display: none"></div>

    <script src="./src/renderer.js"></script>
    <script>
      const remote = require("@electron/remote");
      const { Menu, MenuItem } = remote;
      const moveCursorToEnd = ($li) => {
        // const range = document.createRange();
        const length = $li.innerHTML.length;
        const range = document.createRange();
        range.selectNode($li);
        range.setStart($li, 1);
        range.setEnd($li, 1);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);

        $li.selectionStart = $li.selectionEnd = length;
        $li.focus();
      };

      const renaming = ($li) => {
        $li.contentEditable = true;
        $li.style.border = "1px solid black";
        $li.style.cursor = "text";
        moveCursorToEnd($li);
        const preValue = $li.innerHTML;
        $li.addEventListener(
          "blur",
          (event) => {
            $li.contentEditable = false;
            $li.style.border = "none";
            event.preventDefault();

            const curValue = $li.innerHTML;
            if (curValue != preValue) {
              $li.className += " renamed";
              ipcRenderer.send("renamed", $li.dataset.fullPath, curValue);
            }
          },
          { once: true }
        );
        $li.addEventListener("keypress", function (event) {
          const activeElement = document.activeElement;
          if (event.key === "Enter" && activeElement == $li) {
            $li.blur();
            event.preventDefault();
          }
        });
      };

      const popupMenu = ($li) => {
        if ($li.tagName.toLowerCase() === "li") {
          const menu = new Menu();
          const menuRename = new MenuItem({
            label: "Rename",
            click: (event) => {
              renaming($li);
            },
          });
          menu.append(menuRename);

          const menuDelete = new MenuItem({
            label: "Delete",
            click: (event) => {
              console.log(event);
            },
          });
          menu.append(menuDelete);
          menu.popup(remote.getCurrentWindow());
        }
      };

      window.addEventListener(
        "contextmenu",
        (e) => {
          popupMenu(e.target);
          e.preventDefault();
        },
        false
      );
    </script>
  </body>
</html>
