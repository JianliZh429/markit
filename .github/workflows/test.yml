name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci && npm install --save-dev ts-jest @types/jest

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20.x'
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Build TypeScript
        run: npm run build

      - name: Archive test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/
          retention-days: 7

  build-check:
    runs-on: ubuntu-latest, macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build:prod

      - name: Check for build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not created"
            exit 1
          fi
          if [ ! -f "dist/main/app.js" ]; then
            echo "Build failed: app.js not created"
            exit 1
          fi
          echo "Build successful!"
  package-check:
    runs-on: ubuntu-latest, macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build:prod

      - name: Package application
        run: npm run package

      - name: Check for packaged artifacts
        run: |
          PACKAGE_DIRS=("build/Markit-darwin-x64", "build/Markit-linux-x64")
          for DIR in "${PACKAGE_DIRS[@]}"; do
            if [ -d "$DIR" ]; then
              echo "Found package directory: $DIR"
              PACKAGE_FILES=$(ls "$DIR")
              echo "Package contents:"
              if [ -z "$PACKAGE_FILES" ]; then
                echo "  (No files found)"
              else
                for FILE in $PACKAGE_FILES; do
                  echo "  $FILE"
                done
              fi
            else
              echo "Package failed: $DIR not found"
              exit 1
            fi
          done

          echo "Packaging successful!"
