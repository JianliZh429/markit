name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/*"
  pull_request:
    branches:
      - main
      - develop
      - "feature/*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [18.x, 20.x, 22.x]
        include:
          # Test on macOS with latest LTS only (reduce cost)
          - os: macos-latest
            node-version: 20.x

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20.x'
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Build TypeScript
        run: |
          START_TIME=$(date +%s%N)
          npm run build
          END_TIME=$(date +%s%N)
          DURATION=$((($END_TIME - $START_TIME)/1000000))
          echo "Build duration: ${DURATION}ms"
          echo "build_duration=${DURATION}" >> $GITHUB_ENV

      - name: Cache build outputs
        uses: actions/cache@v3
        with:
          path: |
            dist
            .next
            .nuxt
            build
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Archive test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/
          retention-days: 7

  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build:prod

      - name: Check for build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not created"
            exit 1
          fi
          if [ ! -f "dist/main/app.js" ]; then
            echo "Build failed: app.js not created"
            exit 1
          fi
          echo "Build successful!"

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Show outdated packages
        run: npm outdated
        continue-on-error: true

      - name: Verify dependency tree
        run: npm ls --depth=0

  changelog:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      clean_changelog: ${{ steps.changelog.outputs.clean_changelog }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: |
            {
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["feature", "enhancement"]
                },
                {
                  "title": "## 🐛 Fixes",
                  "labels": ["fix", "bug"]
                },
                {
                  "title": "## 📦 Dependencies",
                  "labels": ["dependencies"]
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-check:
    # Only run package check on main/develop branches (expensive operation)
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    needs: [build-check, changelog]
    needs: build-check
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build:prod

      - name: Package application
        run: npm run package

      - name: Check for packaged artifacts
        run: |
          # Check for OS-specific package directory
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            PACKAGE_DIR="build/Markit-darwin-x64"
          else
            PACKAGE_DIR="build/Markit-linux-x64"
          fi

          if [ ! -d "$PACKAGE_DIR" ]; then
            echo "Package failed: $PACKAGE_DIR not found"
            exit 1
          fi

          echo "Found package: $PACKAGE_DIR"
          ls -lh "$PACKAGE_DIR"
          
          # Check package size
          PACKAGE_SIZE=$(du -sh "$PACKAGE_DIR" | cut -f1)
          echo "Package size: $PACKAGE_SIZE"
          
          # Set size limit (adjust as needed)
          SIZE_LIMIT_MB=500
          ACTUAL_SIZE_MB=$(du -sm "$PACKAGE_DIR" | cut -f1)
          
          if [ "$ACTUAL_SIZE_MB" -gt "$SIZE_LIMIT_MB" ]; then
            echo "::warning::Package size ($ACTUAL_SIZE_MB MB) exceeds limit ($SIZE_LIMIT_MB MB)"
          fi
          
          echo "Packaging successful!"
          
          # Store package info for release
          echo "package_size=$PACKAGE_SIZE" >> $GITHUB_ENV
          echo "package_path=$PACKAGE_DIR" >> $GITHUB_ENV
